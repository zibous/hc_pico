# ═══════════════════════════════════════════════════════════════════════
# Home Assistant Webhook-Vorlage für hc_pico (Kostal Piko PV) – Standard v2
# ═══════════════════════════════════════════════════════════════════════
#
# Konfiguration in .env:
#   HA_WEBHOOK_URL=http://10.1.1.119:8123
#   HA_WEBHOOK_ID=hc_pico
#
# Events:
# ┌──────────────────────┬──────────────────────────────────────────────────────────────┐
# │ Event                │ Felder                                                       │
# ├──────────────────────┼──────────────────────────────────────────────────────────────┤
# │ heartbeat            │ uptime_s, status, kpi{}                                      │
# │ app_start            │ version                                                      │
# │ app_stop             │ message                                                      │
# │ daily_summary        │ date, summary{}                                              │
# │ monthly_summary      │ year, month, summary{}                                       │
# │ sensor_error         │ message, severity, consecutive_errors                        │
# │ sensor_ok            │ message, after_errors                                        │
# │ error                │ message, severity                                            │
# └──────────────────────┴──────────────────────────────────────────────────────────────┘
#
# Alle Payloads: event, app_id ("hc_pico"), version, ts
#
# Heartbeat KPI:
#   sensor_ok, power_day_kwh, power_month_kwh, power_year_kwh, current_power_w, mode
# ═══════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────
# TEMPLATE SENSOREN
# ─────────────────────────────────────────────────────────────────────

template:
  - trigger:
      - platform: webhook
        webhook_id: hc_pico
        allowed_methods:
          - POST
        local_only: true

    sensor:
      # KPI aus Heartbeat (alle 60s aktualisiert)
      - name: "PV Tagesertrag"
        unique_id: hc_pico_power_day
        state: "{{ trigger.json.kpi.power_day_kwh | default(0) }}"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: "mdi:solar-power"
        availability: "{{ trigger.json.event == 'heartbeat' and trigger.json.kpi is defined }}"

      - name: "PV Monatsertrag"
        unique_id: hc_pico_power_month
        state: "{{ trigger.json.kpi.power_month_kwh | default(0) }}"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: "mdi:solar-power-variant"
        availability: "{{ trigger.json.event == 'heartbeat' and trigger.json.kpi is defined }}"

      - name: "PV Jahresertrag"
        unique_id: hc_pico_power_year
        state: "{{ trigger.json.kpi.power_year_kwh | default(0) }}"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: "mdi:solar-power-variant-outline"
        availability: "{{ trigger.json.event == 'heartbeat' and trigger.json.kpi is defined }}"

      - name: "PV Aktuelle Leistung"
        unique_id: hc_pico_current_power
        state: "{{ trigger.json.kpi.current_power_w | default(0) }}"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: "mdi:flash"
        availability: "{{ trigger.json.event == 'heartbeat' and trigger.json.kpi is defined }}"

      - name: "PV Modus"
        unique_id: hc_pico_mode
        state: "{{ trigger.json.kpi.mode | default('unknown') }}"
        icon: "mdi:solar-panel"
        availability: "{{ trigger.json.event == 'heartbeat' and trigger.json.kpi is defined }}"

      - name: "PV Uptime"
        unique_id: hc_pico_uptime
        state: "{{ (trigger.json.uptime_s | default(0) / 3600) | round(1) }}"
        unit_of_measurement: "h"
        icon: "mdi:clock-outline"
        availability: "{{ trigger.json.event == 'heartbeat' }}"

    binary_sensor:
      - name: "PV Sensor Online"
        unique_id: hc_pico_sensor_online
        state: "{{ trigger.json.kpi.sensor_ok | default(false) }}"
        device_class: connectivity
        icon: "mdi:solar-panel-large"
        availability: "{{ trigger.json.event == 'heartbeat' and trigger.json.kpi is defined }}"

      - name: "hc_pico Online"
        unique_id: hc_pico_online
        state: "{{ trigger.json.event == 'heartbeat' }}"
        device_class: connectivity
        icon: "mdi:docker"


# ─────────────────────────────────────────────────────────────────────
# AUTOMATIONS
# ─────────────────────────────────────────────────────────────────────

automation:

  - alias: "hc_pico Webhook Events"
    id: hc_pico_webhook_events
    mode: queued
    max: 5

    trigger:
      - platform: webhook
        webhook_id: hc_pico
        allowed_methods:
          - POST
        local_only: true

    action:
      - choose:

          # ── Sensor offline ──
          - conditions:
              - condition: template
                value_template: "{{ trigger.json.event == 'sensor_error' }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "⚡ Kostal Piko – Sensor offline"
                  message: >-
                    {{ trigger.json.message | default('Wechselrichter nicht erreichbar') }}
                    ({{ trigger.json.consecutive_errors | default('?') }}x)
                  notification_id: hc_pico_sensor_error
              - service: notify.notify
                data:
                  title: "⚡ PV Sensor offline"
                  message: "{{ trigger.json.message | default('Nicht erreichbar') }}"

          # ── Sensor wieder online ──
          - conditions:
              - condition: template
                value_template: "{{ trigger.json.event == 'sensor_ok' }}"
            sequence:
              - service: persistent_notification.dismiss
                data:
                  notification_id: hc_pico_sensor_error
              - service: logbook.log
                data:
                  name: hc_pico
                  message: "✅ Sensor wieder online (nach {{ trigger.json.after_errors | default('?') }} Fehlern)"

          # ── Kritischer Fehler ──
          - conditions:
              - condition: template
                value_template: "{{ trigger.json.event == 'error' }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "🔴 hc_pico – Kritischer Fehler"
                  message: "{{ trigger.json.message | default('Unbekannt') }}"
                  notification_id: hc_pico_critical

          # ── App Start ──
          - conditions:
              - condition: template
                value_template: "{{ trigger.json.event == 'app_start' }}"
            sequence:
              - service: logbook.log
                data:
                  name: hc_pico
                  message: "🟢 v{{ trigger.json.version | default('?') }} gestartet"

          # ── App Stop ──
          - conditions:
              - condition: template
                value_template: "{{ trigger.json.event == 'app_stop' }}"
            sequence:
              - service: logbook.log
                data:
                  name: hc_pico
                  message: "🔴 {{ trigger.json.message | default('Gestoppt') }}"

          # ── Tagesübersicht ──
          - conditions:
              - condition: template
                value_template: "{{ trigger.json.event == 'daily_summary' }}"
            sequence:
              - service: logbook.log
                data:
                  name: hc_pico
                  message: >-
                    ☀️ {{ trigger.json.date }}: Tag {{ trigger.json.summary.power_day_kwh | default(0) }} kWh ·
                    Monat {{ trigger.json.summary.power_month_kwh | default(0) }} kWh ·
                    Jahr {{ trigger.json.summary.power_year_kwh | default(0) }} kWh
