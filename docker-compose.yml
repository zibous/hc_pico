services:
  hc_pico:
    build: .
    container_name: hc_pico
    restart: unless-stopped

    ports:
      - "5098:5098"

    volumes:
      - ${PWD}/data:/app/data
      - ${PWD}/config:/app/config
      - ${PWD}/frontend:/app/frontend
      - ${PWD}/logs:/app/logs

    env_file:
      - .env

    environment:
      - TZ=Europe/Vaduz
      - ROOT_PATH=/dashboardpico

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5098/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

